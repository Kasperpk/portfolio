<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Books &mdash; Kasper Kærgaard Pedersen</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-name">Analytical Mastery</a>
    <ul>
      <li><a href="../index.html#about">About</a></li>
      <li><a href="../index.html#projects">Projects</a></li>
      <li><a href="../index.html#skills">Skills</a></li>
      <li><a href="../blog/index.html">Blog</a></li>
      <li><a href="index.html" class="active">Books</a></li>
      <li><a href="../index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <section id="books-list">
    <div class="container">
      <h2 class="section-title">Books</h2>
      <p class="section-sub">Open-source book projects &mdash; free preview chapters, full access available</p>
      <div id="books-container">
        <p class="loading">Loading books&hellip;</p>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>Built from scratch &middot; Kasper Kærgaard Pedersen &middot; 2026</p>
    </div>
  </footer>

  <script>
    async function loadBooks() {
      const container = document.getElementById('books-container');
      try {
        const res = await fetch('books.json');
        const books = await res.json();

        if (books.length === 0) {
          container.innerHTML = '<p class="loading">No books yet.</p>';
          return;
        }

        container.innerHTML = books.map((book) => {
          const totalChapters = book.sections.reduce((sum, s) => sum + s.chapters.length, 0);
          const freeChapters = book.sections.reduce((sum, s) => sum + s.chapters.filter(c => c.free).length, 0);
          const sectionCount = book.sections.length;

          return `
            <a href="reader.html?book=${book.slug}" class="book-card">
              <div class="book-cover" style="--cover-accent: ${book.coverColor}">
                <div class="book-cover-inner">
                  <span class="book-cover-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                    </svg>
                  </span>
                  <span class="book-cover-title">${book.title}</span>
                  <span class="book-cover-subtitle">${book.subtitle}</span>
                </div>
              </div>
              <div class="book-info">
                <div class="book-info-header">
                  <h3>${book.title}</h3>
                  <span class="book-status">${book.status}</span>
                </div>
                <p class="book-desc">${book.description}</p>
                <div class="book-meta-row">
                  <span class="book-meta-item">${sectionCount} sections</span>
                  <span class="book-meta-sep">&middot;</span>
                  <span class="book-meta-item">${totalChapters} chapters</span>
                  <span class="book-meta-sep">&middot;</span>
                  <span class="book-meta-item">${freeChapters} free</span>
                </div>
                <div class="book-tags">
                  ${book.tags.map(t => `<span>${t}</span>`).join('')}
                </div>
                <div class="book-updated">
                  Last updated ${new Date(book.lastUpdated).toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' })}
                </div>
              </div>
              <svg class="post-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
              </svg>
            </a>
          `;
        }).join('');

      } catch (e) {
        container.innerHTML = '<p class="loading">Failed to load books.</p>';
      }
    }

    loadBooks();
  </script>
</body>
</html>
